<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleWear - Clothing Brand</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f5f5f5;
}

/* Navbar */
header {
  background: #111;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 24px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* Hero Section */
.hero {
  background: url('https://images.unsplash.com/photo-1521334884684-d80222895322') center/cover;
  height: 70vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero h2 {
  font-size: 40px;
  background: rgba(0,0,0,0.6);
  padding: 10px 20px;
}

/* Products */
.products {
  padding: 50px 20px;
  text-align: center;
}

.products h2 {
  margin-bottom: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card h3 {
  margin: 10px 0;
}

/* Footer */
footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 20px;
}
</style>

</head>

<body>

<header>
  <h1>StyleWear</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>New Fashion Collection 2026</h2>
</section>

<section class="products">
  <h2>Our Products</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" alt="">
      <h3>T-Shirt</h3>
      <p>Rs 1200</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975682031-ae67c7c8f2d8" alt="">
      <h3>Hoodie</h3>
      <p>Rs 2500</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520974735194-6e6c8c6b0b0f" alt="">
      <h3>Jacket</h3>
      <p>Rs 3500</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 StyleWear. All Rights Reserved.</p>
</footer>

</body>
</html>
